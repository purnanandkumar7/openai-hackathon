apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: atlas-ai-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
    - name: metrics
      protocol: TCP
      port: 9121
      targetPort: metrics
---
# Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: atlas-ai-platform
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
