apiVersion: v1
kind: Service
metadata:
  name: atlas-ai-frontend-service
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: atlas-ai-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: atlas-ai-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atlas-ai-frontend
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
