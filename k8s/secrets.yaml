apiVersion: v1
kind: Secret
metadata:
  name: atlas-ai-secrets
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: atlas-ai
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: atlas-ai-platform
  annotations:
    # IMPORTANT: Replace all placeholder values before deploying.
    # Recommended: Use a secrets manager (e.g. Vault, AWS Secrets Manager,
    # Sealed Secrets, or External Secrets Operator) to inject real values.
    # Never commit real secret values to source control.
    secret-store: "vault"
    vault-path: "secret/atlas-ai/production"
type: Opaque
# Values must be base64-encoded. Example:
#   echo -n "my-secret-value" | base64
# These are placeholder strings — replace before deploying.
stringData:
  # ── LLM Provider ─────────────────────────────────────────────────────────
  OPENAI_API_KEY: "<your-openai-api-key>"

  # ── Database ──────────────────────────────────────────────────────────────
  # Format: postgresql://user:secret@host:port/dbname
  DATABASE_URL: "postgresql://atlas_ai:<db-secret>@postgres-service.atlas-ai.svc.cluster.local:5432/atlas_ai"
  POSTGRES_PASSWORD: "<db-secret>"
  POSTGRES_USER: "atlas_ai"

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Format: redis://:<secret>@host:port/db
  REDIS_URL: "redis://:<redis-secret>@redis-service.atlas-ai.svc.cluster.local:6379/0"
  REDIS_PASSWORD: "<redis-secret>"

  # ── GitHub Integration ────────────────────────────────────────────────────
  # Fine-grained PAT with: repo:read, issues:read, pull_requests:read
  GITHUB_TOKEN: "ghp_REPLACE_WITH_GITHUB_TOKEN"
  GITHUB_WEBHOOK_SECRET: "REPLACE_WITH_GITHUB_WEBHOOK_SECRET"

  # ── Slack Integration ─────────────────────────────────────────────────────
  SLACK_BOT_TOKEN: "xoxb-REPLACE_WITH_SLACK_BOT_TOKEN"
  SLACK_APP_TOKEN: "xapp-REPLACE_WITH_SLACK_APP_TOKEN"
  SLACK_SIGNING_SECRET: "REPLACE_WITH_SLACK_SIGNING_SECRET"
  SLACK_CHANNEL_INCIDENTS: "#incidents"
  SLACK_CHANNEL_ALERTS: "#alerts"

  # ── Jira Integration ─────────────────────────────────────────────────────
  JIRA_URL: "https://company.atlassian.net"
  JIRA_TOKEN: "REPLACE_WITH_JIRA_API_TOKEN"
  JIRA_USER_EMAIL: "atlas-ai-bot@company.com"
  JIRA_PROJECT_KEY: "INFRA"

  # ── PagerDuty Integration (optional) ─────────────────────────────────────
  PAGERDUTY_API_KEY: "REPLACE_WITH_PAGERDUTY_API_KEY"
  PAGERDUTY_SERVICE_ID: "REPLACE_WITH_PAGERDUTY_SERVICE_ID"

  # ── JWT / Auth ────────────────────────────────────────────────────────────
  # Generate with: openssl rand -hex 64
  JWT_SECRET_KEY: "REPLACE_WITH_JWT_SECRET_KEY_64_CHARS_MIN"
  ENCRYPTION_KEY: "REPLACE_WITH_FERNET_ENCRYPTION_KEY"

  # ── Grafana ───────────────────────────────────────────────────────────────
  GRAFANA_API_KEY: "REPLACE_WITH_GRAFANA_API_KEY"

  # ── TLS Certificate (Ingress) ─────────────────────────────────────────────
  # Managed by cert-manager — these fields are populated automatically
  # when using cert-manager with Let's Encrypt. Leave as placeholder.
  tls.crt: "REPLACE_WITH_TLS_CERTIFICATE_BASE64"
  tls.key: "REPLACE_WITH_TLS_PRIVATE_KEY_BASE64"
