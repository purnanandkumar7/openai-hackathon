apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: atlas-ai-cluster-reader-binding
  labels:
    app.kubernetes.io/name: atlas-ai
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: atlas-ai-platform
  annotations:
    description: "Binds the atlas-ai-sa ServiceAccount to the atlas-ai-cluster-reader ClusterRole"
subjects:
  - kind: ServiceAccount
    name: atlas-ai-sa
    namespace: atlas-ai
roleRef:
  kind: ClusterRole
  name: atlas-ai-cluster-reader
  apiGroup: rbac.authorization.k8s.io
