apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas-ai-sa
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: atlas-ai
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: atlas-ai-platform
  annotations:
    description: "Service account for Atlas AI agents with read-only cluster access"
    # Uncomment below if using IAM Roles for Service Accounts (IRSA) on EKS:
    # eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/atlas-ai-role"
    # Uncomment below if using Workload Identity on GKE:
    # iam.gke.io/gcp-service-account: "atlas-ai@PROJECT_ID.iam.gserviceaccount.com"
automountServiceAccountToken: true
