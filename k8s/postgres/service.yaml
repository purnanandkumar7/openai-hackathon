apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: atlas-ai-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: postgres
    - name: metrics
      protocol: TCP
      port: 9187
      targetPort: metrics
---
# Headless service for StatefulSet DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: atlas-ai-platform
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: postgres
