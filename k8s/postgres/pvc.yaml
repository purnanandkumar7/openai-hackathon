apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: atlas-ai
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: atlas-ai-platform
  annotations:
    # This PVC is used as a backup/standalone claim.
    # The StatefulSet manages its own PVC via volumeClaimTemplates.
    # Use this manifest for standalone Postgres deployments or manual restores.
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "standard"
  resources:
    requests:
      storage: 20Gi
